<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrisisLens — Disaster Intelligence</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:      #07101a;
      --bg-surface:   #0d1825;
      --bg-card:      #111f2e;
      --bg-hover:     #182840;
      --border:       rgba(80,120,170,0.15);
      --border-hi:    rgba(80,120,170,0.35);
      --text-1:       #dceaf8;
      --text-2:       #7fa8cc;
      --text-3:       #3d6080;
      --accent:       #3b82f6;
      --red:          #ef4444;
      --amber:        #f59e0b;
      --green:        #22c55e;
      --font:         'Space Grotesk', sans-serif;
      --mono:         'JetBrains Mono', monospace;
    }

    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body { font-family: var(--font); background: var(--bg-base); color: var(--text-1); }

    /* ─── App shell ─── */
    .app-shell { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

    /* ─── Topbar ─── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; height: 54px; min-height: 54px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      z-index: 999;
    }
    .topbar-brand { display: flex; align-items: center; gap: 10px; }
    .brand-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--red); box-shadow: 0 0 10px var(--red);
      animation: blink 1.6s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .brand-name { font-size: 17px; font-weight: 700; letter-spacing: 0.1em; color: var(--text-1); }
    .brand-tag  { font-size: 11px; color: var(--text-3); font-weight: 500; letter-spacing: 0.04em; }

    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .update-label { font-size: 11px; color: var(--text-3); font-family: var(--mono); }
    .refresh-btn {
      font-family: var(--font); font-size: 12px; font-weight: 600;
      padding: 5px 14px; border-radius: 6px; cursor: pointer;
      background: transparent; color: var(--accent);
      border: 1px solid rgba(59,130,246,0.35);
      transition: all 0.2s;
    }
    .refresh-btn:hover { background: rgba(59,130,246,0.1); }

    /* stream badge */
    .stream-badge { font-size:10px; font-weight:700; letter-spacing:0.08em; padding:3px 9px; border-radius:4px; margin-left:4px; }
    .stream-badge.live       { color:var(--green);  background:rgba(34,197,94,0.1);   border:1px solid rgba(34,197,94,0.3); }
    .stream-badge.connecting { color:var(--amber);  background:rgba(245,158,11,0.1);  border:1px solid rgba(245,158,11,0.3); animation:blink 1s infinite; }
    .stream-badge.offline    { color:var(--text-3); background:rgba(255,255,255,0.04); border:1px solid var(--border); }
    .brand-dot.live          { background:var(--green); box-shadow:0 0 10px var(--green); }
    .brand-dot.connecting    { background:var(--amber); box-shadow:0 0 10px var(--amber); }
    .brand-dot.offline       { background:var(--text-3); box-shadow:none; animation:none; }

    /* ─── Stats bar (in topbar center) ─── */
    .statsbar { display: flex; align-items: center; gap: 2px; }
    .stat-pill {
      display: flex; flex-direction: column; align-items: center;
      padding: 0 16px;
    }
    .stat-num   { font-size: 18px; font-weight: 700; font-family: var(--mono); line-height: 1; }
    .stat-lbl   { font-size: 10px; color: var(--text-3); letter-spacing: 0.05em; margin-top: 1px; }
    .stat-total { color: var(--text-1); }
    .stat-high  { color: var(--red); }
    .stat-med   { color: var(--amber); }
    .stat-low   { color: var(--green); }
    .stat-sep   { width: 1px; height: 28px; background: var(--border); }

    /* ─── Ticker ─── */
    .ticker {
      display: flex; align-items: center; height: 28px; min-height: 28px;
      background: rgba(239,68,68,0.05);
      border-bottom: 1px solid rgba(239,68,68,0.18);
      overflow: hidden;
    }
    .ticker-badge {
      flex-shrink: 0; padding: 0 14px; height: 100%;
      display: flex; align-items: center;
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      color: var(--red); border-right: 1px solid rgba(239,68,68,0.2);
    }
    .ticker-scroll { flex: 1; overflow: hidden; }
    .ticker-inner {
      display: inline-flex; white-space: nowrap;
      animation: scroll 28s linear infinite;
    }
    @keyframes scroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    .ticker-item { display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--text-2); padding:0 8px; }
    .ticker-item strong { color: var(--text-1); }
    .t-dot  { width:5px; height:5px; border-radius:50%; background:var(--red); flex-shrink:0; }
    .t-sep  { opacity:0.25; margin-left:6px; }

    /* ─── Main layout ─── */
    .main-layout { display: flex; flex: 1; overflow: hidden; }
    .map-pane  { flex: 1; position: relative; min-width: 0; }
    .feed-pane {
      width: 390px; min-width: 390px;
      display: flex; flex-direction: column;
      background: var(--bg-surface);
      border-left: 1px solid var(--border);
      overflow: hidden;
    }

    /* ─── Feed ─── */
    .feed-wrap { display: flex; flex-direction: column; height: 100%; }

    .feed-head {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      flex-shrink: 0;
    }
    .feed-head-row { display: flex; align-items: center; gap: 8px; }
    .feed-city   { font-size: 15px; font-weight: 700; }
    .feed-count  {
      font-size: 11px; color: var(--text-3); font-weight: 500;
      background: var(--bg-hover); padding: 2px 8px; border-radius: 10px;
    }
    .feed-placeholder { color: var(--text-3); font-size: 14px; font-weight: 500; }
    .feed-filters { display: flex; gap: 6px; margin-top: 10px; }
    .f-tag {
      font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
      padding: 3px 10px; border-radius: 4px; cursor: pointer;
      background: var(--bg-hover); color: var(--text-3);
      border: 1px solid transparent; transition: all 0.15s;
    }
    .f-tag:hover, .f-tag.active { color: var(--text-1); border-color: var(--border-hi); }
    .f-tag.f-all    { }
    .f-tag.f-high   { color: var(--red); }
    .f-tag.f-medium { color: var(--amber); }
    .f-tag.f-low    { color: var(--green); }

    .feed-list {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .feed-list::-webkit-scrollbar { width: 3px; }
    .feed-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ─── Empty / loading states ─── */
    .feed-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; flex: 1; gap: 10px;
      color: var(--text-3); text-align: center; padding: 40px;
    }
    .feed-state-icon { font-size: 38px; opacity: 0.45; }
    .feed-state p    { font-size: 13px; font-weight: 500; color: var(--text-2); }
    .feed-state small { font-size: 11px; color: var(--text-3); }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg) } }

    /* ─── Feed card ─── */
    .feed-card {
      border-left: 3px solid;
      border-radius: 0 8px 8px 0;
      padding: 10px 13px;
      transition: transform 0.15s;
      animation: fadeSlide 0.3s ease;
    }
    @keyframes fadeSlide { from{opacity:0;transform:translateX(8px)} to{opacity:1;transform:none} }
    .feed-card:hover { transform: translateX(3px); }

    .card-top { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; flex-wrap: wrap; }
    .urgency-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; }
    .dtype-tag {
      font-size: 10px; font-weight: 600;
      background: rgba(255,255,255,0.05); color: var(--text-2);
      padding: 2px 7px; border-radius: 4px;
    }
    .card-time { font-size: 10px; color: var(--text-3); font-family: var(--mono); margin-left: auto; }

    .card-text { font-size: 12px; line-height: 1.6; color: var(--text-2); margin-bottom: 8px; }

    .card-foot { display: flex; justify-content: space-between; align-items: center; }
    .card-source { font-size: 10px; color: var(--text-3); }
    .card-conf   { font-size: 10px; color: var(--text-3); font-family: var(--mono); }

    /* ─── Map overrides ─── */
    .leaflet-container { background: #07101a !important; }
    .leaflet-control-zoom a {
      background: var(--bg-card) !important;
      color: var(--text-2) !important;
      border-color: var(--border) !important;
    }

    /* ─── Markers ─── */
    .mk { position:relative; width:56px; height:56px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .mk-ring {
      position:absolute; width:30px; height:30px; border-radius:50%;
      border:2px solid; opacity:0.45; animation:pulse 2.2s ease-in-out infinite;
    }
    .mk-dot { width:11px; height:11px; border-radius:50%; z-index:2; box-shadow:0 0 8px rgba(0,0,0,0.6); }
    .mk-lbl {
      position:absolute; bottom:-16px; left:50%; transform:translateX(-50%);
      white-space:nowrap; font-size:10px; font-family:var(--font); font-weight:600;
      color:#dceaf8; text-shadow:0 1px 4px #000;
    }
    .mk.sel .mk-ring { opacity:1; animation:pulse-sel 1s ease-in-out infinite; }
    .mk.sel .mk-dot  { width:15px; height:15px; }
    @keyframes pulse     { 0%,100%{transform:scale(1);opacity:0.45} 50%{transform:scale(1.6);opacity:0.15} }
    @keyframes pulse-sel { 0%,100%{transform:scale(1);opacity:1}    50%{transform:scale(1.9);opacity:0.35} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
